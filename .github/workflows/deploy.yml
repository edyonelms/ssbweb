name: Deploy SSBWeb to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/ssbweb

            git pull origin main

            sudo rm -rf vendor/laravel/sail/database/mysql/create-testing-database.sh

            docker compose exec -T laravel.test composer install --no-dev --optimize-autoloader

            docker compose up -d --remove-orphans --wait || (echo "==== MYSQL LOGS ====" && docker compose logs mysql && echo "==== REDIS LOGS ====" && docker compose logs redis && echo "==== LARAVEL LOGS ====" && docker compose logs laravel.test && exit 1)

            docker compose exec -T laravel.test php artisan config:clear
            docker compose exec -T laravel.test php artisan route:clear
            docker compose exec -T laravel.test php artisan view:clear
            docker compose exec -T laravel.test php artisan migrate --force
            docker compose exec -T laravel.test php artisan db:seed --force
